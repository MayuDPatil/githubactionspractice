name: matrix-stragegy

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: setup python
          uses: actions/setup-python@v4
          with:
              python-version: "3.10"

        - name: install dependencies
          run: pip insatll -r requiremnts.txt

        - name: run linter
          run: flake8 main.py