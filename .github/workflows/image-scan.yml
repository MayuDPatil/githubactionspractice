name: trivy scan

on:
    workflow_call:

jobs:
    trivy-scan:
        runs-on: ubuntu-latest

        steps:

           - name: code checkout
             uses: actions/checkout@v4

              # once the image is built and pushed to docker hub, we can scan it with trivy and to do that we need to login to docker hub first
            - name: login to docker hub
              uses: docker/login-action@v3
              with:
                username: ${{vars.DOCKERHUB_USERNAME}}
                password: ${{secrets.DOCKERHUB_TOKEN}}

            - name: scan image with trivy
              uses: aquasecurity/trivy-action@0.35.0
              with:
                image-ref: ${{vars.DOCKERHUB_USERNAME}}/github-actions-practice:${{github.sha}}
                severity: CRITICAL
                exit-code: '1'
                trivyignore: ${{github.workspace}}/.trivyignore
