name: trivy scan

on:
    workflow_call:

jobs:
    trivy-scan:
        runs-on: self-hosted

        steps:

              # once the image is built and pushed to docker hub, we can scan it with trivy and to do that we need to login to docker hub first
            - name: login to docker hub
              uses: docker/login-action@v2
              with:
                username: ${{vars.dockerhub_username}}
                password: ${{secrets.dockerhub_token}}

            - name: scan image with trivy
              uses: aquasecurity/trivy-action@v0.33.1
              with:
                severities: CRITICAL
                exit-code: '1'
