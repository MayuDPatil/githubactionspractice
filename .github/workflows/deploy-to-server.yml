name: Deploy To Server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
        DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        DOCKER_TAG: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH to Prod server & prepare environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            mkdir -p ~/devops
            rm -f ~/devops/docker-compose.yml

      - name: Copy docker-compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops/
          overwrite: true

      - name: Debug vars
        run: |
          echo "USERNAME=${{ vars.DOCKERHUB_USERNAME }}"
          echo "SHA=${{ github.sha }}"

      - name: Run application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            echo "running app"
          
            export DOCKERHUB_USERNAME="${{ vars.DOCKERHUB_USERNAME }}"
            export DOCKER_TAG="${{ github.sha }}"

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              --username ${{ vars.DOCKERHUB_USERNAME }} \
              --password-stdin

            cd ~/devops
            docker compose down
            sudo docker compose up -d --build --force-recreate pull always
            