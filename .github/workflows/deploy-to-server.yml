name: Deploy To Server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKER_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH to Prod server & prepare environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            rm -rf ~/devops/docker-compose.yml
            mkdir -p ~/devops

      - name: Copy docker-compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops/
          overwrite: true

      - name: Run application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            echo "Starting application"
            export DOCKERHUB_USERNAME=${{ vars.DOCKERHUB_USERNAME }}
            export DOCKER_TAG=${{ github.sha }}

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login --username "${{ vars.DOCKERHUB_USERNAME }}" --password-stdin

            cd ~/devops

            sudo docker compose down
            sudo docker compose up -d --build --force-recreate --pull always

            sudo docker ps