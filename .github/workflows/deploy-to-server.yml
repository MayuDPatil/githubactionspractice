name: Deploy To Server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKER_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH to Prod server & prepare environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            echo "Installing Docker"
            sudo apt-get update
            sudo apt-get install -y docker.io docker-compose-v2

            sudo systemctl start docker
            sudo systemctl enable docker

            rm -rf ~/devops/docker-compose.yml
            mkdir -p ~/devops

      - name: Copy docker-compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops/
          overwrite: true

      - name: Run application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            echo "Starting application"

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login --username "${{ vars.DOCKERHUB_USER }}" --password-stdin

            cd ~/devops

            sudo docker compose down
            sudo docker compose up -d --build --force-recreate --pull always

            sudo docker ps