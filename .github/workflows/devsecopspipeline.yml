name: devsecopspipeline

on: 
    push:
        branches: [main]

jobs:

    code-quality:
          uses: ./.github/workflows/code-quality.yml

    secret-scan:
          uses: ./.github/workflows/secrets-scan.yml
          
    dependency-scan:
          uses: ./.github/workflows/dependency-scan.yml

    docker-scan:
            uses: ./.github/workflows/docker-lint.yml

    image-build-push:
            needs: [code-quality, secret-scan, docker-scan, dependency-scan]
            uses: ./.github/workflows/docker-build-push.yml
            secrets: inherit

    image-scan:
            needs: [image-build-push]
            uses: ./.github/workflows/image-scan.yml
            secrets: inherit
    deploy:
            needs: [image-scan]
            uses: ./.github/workflows/deploy-to-server.yml
            secrets: inherit 
            with:
              dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }} 
    