<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Flask App | GitHub Actions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #764ba2;
        }

        .result {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .result.show {
            display: block;
        }

        .result-text {
            color: #333;
            font-size: 15px;
            line-height: 1.6;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .status.success {
            display: block;
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Flask App</h1>

        <!-- Greet Section -->
        <div class="section">
            <h2>👋 Greet Someone</h2>
            <div class="input-group">
                <label for="greetName">Enter a name:</label>
                <input type="text" id="greetName" placeholder="e.g., GitHub Actions" value="GitHub Actions">
            </div>
            <button onclick="sendGreeting()">Send Greeting</button>
            <div id="greetResult" class="result">
                <div class="result-text" id="greetMessage"></div>
            </div>
        </div>

        <!-- Sum Section -->
        <div class="section">
            <h2>🧮 Calculate Sum</h2>
            <div class="input-group">
                <label for="numbersList">Enter numbers (comma-separated):</label>
                <textarea id="numbersList" placeholder="e.g., 1,2,3,4,5" rows="3">1,2,3,4,5</textarea>
            </div>
            <button onclick="calculateSum()">Calculate Sum</button>
            <div id="sumResult" class="result">
                <div class="result-text" id="sumMessage"></div>
            </div>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script>
        async function sendGreeting() {
            const name = document.getElementById('greetName').value || 'World';
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status';
            statusDiv.textContent = 'Loading...';

            try {
                const response = await fetch('/api/greet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });
                const data = await response.json();
                document.getElementById('greetMessage').textContent = data.message;
                document.getElementById('greetResult').classList.add('show');
                statusDiv.className = 'status success';
                statusDiv.textContent = '✓ Success!';
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '✗ Error: ' + error.message;
            }
        }

        async function calculateSum() {
            const input = document.getElementById('numbersList').value;
            const numbers = input.split(',').map(n => parseFloat(n.trim())).filter(n => !isNaN(n));
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status';
            statusDiv.textContent = 'Loading...';

            if (numbers.length === 0) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '✗ Please enter valid numbers';
                return;
            }

            try {
                const response = await fetch('/api/sum', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ numbers: numbers })
                });
                const data = await response.json();
                document.getElementById('sumMessage').textContent = 
                    `Numbers: ${data.numbers.join(', ')}\nSum: ${data.result}`;
                document.getElementById('sumResult').classList.add('show');
                statusDiv.className = 'status success';
                statusDiv.textContent = '✓ Success!';
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '✗ Error: ' + error.message;
            }
        }

        // Allow Enter key to submit
        document.getElementById('greetName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendGreeting();
        });
        document.getElementById('numbersList').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculateSum();
        });
    </script>
</body>
</html>
